services:
  postgres:
    image: postgres:16
    container_name: codex_training_postgres
    environment:
      POSTGRES_DB: trainingdb
      POSTGRES_USER: training
      POSTGRES_PASSWORD: training
    ports:
      - "5432:5432"
    volumes:
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

